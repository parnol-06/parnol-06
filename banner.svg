<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <style>
      @keyframes pulse1 { 0%,100%{r:3;opacity:0.9} 50%{r:5;opacity:0.5} }
      @keyframes pulse2 { 0%,100%{r:2;opacity:0.7} 50%{r:4;opacity:0.3} }
      @keyframes pulse3 { 0%,100%{r:4;opacity:0.8} 50%{r:2;opacity:0.4} }
      @keyframes pulse4 { 0%,100%{r:2.5;opacity:0.9} 50%{r:4.5;opacity:0.5} }
      @keyframes pulse5 { 0%,100%{r:3.5;opacity:0.6} 50%{r:1.5;opacity:1} }
      @keyframes flow1 { 0%{stroke-dashoffset:200} 100%{stroke-dashoffset:0} }
      @keyframes flow2 { 0%{stroke-dashoffset:150} 100%{stroke-dashoffset:0} }
      @keyframes flow3 { 0%{stroke-dashoffset:180} 100%{stroke-dashoffset:0} }
      @keyframes fadein { 0%{opacity:0} 100%{opacity:1} }
      .n1 { animation: pulse1 3s ease-in-out infinite; }
      .n2 { animation: pulse2 4s ease-in-out infinite; }
      .n3 { animation: pulse3 2.5s ease-in-out infinite; }
      .n4 { animation: pulse4 3.5s ease-in-out infinite; }
      .n5 { animation: pulse5 2s ease-in-out infinite; }
      .l1 { stroke-dasharray: 8 4; animation: flow1 3s linear infinite; }
      .l2 { stroke-dasharray: 6 5; animation: flow2 4s linear infinite; }
      .l3 { stroke-dasharray: 10 4; animation: flow3 2.5s linear infinite; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A1535"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Left cluster lines -->
  <line class="l1" x1="30" y1="40" x2="110" y2="80" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l2" x1="30" y1="40" x2="70" y2="140" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l3" x1="70" y1="140" x2="150" y2="100" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l1" x1="110" y1="80" x2="150" y2="100" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l2" x1="110" y1="80" x2="180" y2="45" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l3" x1="150" y1="100" x2="180" y2="45" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l1" x1="70" y1="140" x2="120" y2="175" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l2" x1="150" y1="100" x2="120" y2="175" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l3" x1="30" y1="40" x2="55" y2="15" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l1" x1="55" y1="15" x2="110" y2="80" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>

  <!-- Right cluster lines -->
  <line class="l2" x1="870" y1="30" x2="800" y2="75" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l1" x1="870" y1="30" x2="845" y2="125" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l3" x1="845" y1="125" x2="760" y2="90" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l2" x1="800" y1="75" x2="760" y2="90" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l1" x1="800" y1="75" x2="755" y2="40" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l3" x1="760" y1="90" x2="755" y2="40" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l2" x1="845" y1="125" x2="810" y2="170" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l1" x1="760" y1="90" x2="810" y2="170" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l3" x1="870" y1="30" x2="858" y2="8" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>
  <line class="l2" x1="858" y1="8" x2="800" y2="75" stroke="#7F77DD" stroke-width="0.7" opacity="0.35"/>

  <!-- Left nodes -->
  <circle class="n1" cx="30" cy="40" r="3" fill="#7F77DD"/>
  <circle class="n3" cx="55" cy="15" r="2" fill="#534AB7"/>
  <circle class="n2" cx="110" cy="80" r="4" fill="#AFA9EC"/>
  <circle class="n4" cx="70" cy="140" r="2.5" fill="#7F77DD"/>
  <circle class="n5" cx="150" cy="100" r="3.5" fill="#3C3489"/>
  <circle class="n1" cx="180" cy="45" r="2" fill="#AFA9EC"/>
  <circle class="n3" cx="120" cy="175" r="3" fill="#7F77DD"/>

  <!-- Right nodes -->
  <circle class="n2" cx="870" cy="30" r="3" fill="#7F77DD"/>
  <circle class="n4" cx="858" cy="8" r="2" fill="#534AB7"/>
  <circle class="n1" cx="800" cy="75" r="4" fill="#AFA9EC"/>
  <circle class="n3" cx="845" cy="125" r="2.5" fill="#7F77DD"/>
  <circle class="n2" cx="760" cy="90" r="3.5" fill="#3C3489"/>
  <circle class="n5" cx="755" cy="40" r="2" fill="#AFA9EC"/>
  <circle class="n1" cx="810" cy="170" r="3" fill="#7F77DD"/>

  <!-- Centered text block -->
  <text x="450" y="82" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#534AB7">~/arnol $&gt;</text>
  <text x="450" y="108" text-anchor="middle" font-family="Courier New, monospace" font-size="18" font-weight="bold" fill="#ffffff">Arnol Ferney P&#233;rez Paniagua</text>
  <text x="450" y="130" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#AFA9EC">Data Analysis &#183; AI &#183; IT Platform Admin &#183; QA Engineer</text>
  <text x="450" y="152" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#7F77DD" letter-spacing="1">ISO 8583 &#183; Postilion &#183; SQL Server &#183; Power BI &#183; Machine Learning</text>
</svg>
